services:
  elh-db:
    image: postgres:18-alpine
    container_name: elh-db
    environment:
      POSTGRES_USER: elh_user
      POSTGRES_PASSWORD: elh_password
      POSTGRES_DB: elh
    ports:
      - "5432:5432"
    networks:
      - elh-network
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elh_user -d elh"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  elh-nestjs:
    build:
      context: ./apps/backend/
      dockerfile: Dockerfile
    container_name: elh-backend
    ports:
      - "4000:4000"
    env_file:
      - ./apps/backend/.env
    depends_on:
      elh-db:
        condition: service_healthy
    networks:
      - elh-network

networks:
  elh-network:
    driver: bridge

volumes:
  pgdata: